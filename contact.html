<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact info</title>
    <link rel="stylesheet" href="final project.css">
</head>
<body>
    <header class="header">
        <h1 class="header__h1">Welcome to Zax!! Buy your shoes</h1>
        <nav class="header__nav">
            <ul class="header__ul">
                <li>
                    <a href="contact.html">Contact info</a>
                </li>

                <li>
                    <a href="about.html">About more :)</a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="main">
        <article class="main__article">
            <h2 class="contact__h2">Our Location Information</h2>
            <address class="contact__address">
                756 4rd street, Bade-Lony area near police station,
                southern London, United Kingdom.
                <br><br>
                phone:<a href="tel:+555554444">555-554-444</a>
                
            </address>
        </article>

        <article class="main__article">
            <h2 class="contact__h2">Contact Form</h2>

            <form action="https://httpbin.org/get" method="get">
                <fieldset>
                    <legend class="contact__lengend">Send us message</legend>
                    
                    <p>
                        <label class="contact__label" for="name">Name:</label>
                        <input class="contact__input" type="text" name="name" id="name"
                        placeholder="Your name" required>
                    </p>

                    <p>
                        <label class="contact__label" for="email">Email:</label>
                        <input class="contact__input" type="email" name="email" id="email" 
                        placeholder="enter your email id" required>
                    </p>

                    <p>
                        <label class="contact__label" for="message">Message:</label>
                        <textarea class="contact__textarea" name="message" id="message" cols="30"
                        rows="10"></textarea>
                    </p>
                </fieldset>
                <button class="contact__button" type="submit">Submit</button>
                <button class="contact__button" type="reset">reset</button>
            </form>
        </article>
    </main>

    <footer class="footer">
        <span class="nowrap">&copy; 2026 Zax Shoes.
        All rights reserved</span>
        <span class="nowrap">The best shoes for you!</span>

    </footer>

</body>
</html>
